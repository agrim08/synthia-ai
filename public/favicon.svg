<svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
  <!-- Background to ensure visibility on all tab themes -->
  <rect width="36" height="36" rx="8" fill="#0f172a" />
  
  <!-- Left chevron < -->
  <polyline
    points="20,8 8,18 20,28"
    fill="none"
    stroke="white"
    stroke-width="3.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Right chevron > -->
  <polyline
    points="14,12 26,18 14,24"
    fill="none"
    stroke="white"
    stroke-width="3.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Coral ownership dot — right terminal -->
  <circle cx="26" cy="18" r="3" fill="#c45c32" />

  <!-- Coral center dot — ownership point -->
  <circle cx="17.5" cy="18" r="2" fill="#c45c32" opacity="0.85" />

  <!-- White left terminal dot -->
  <circle cx="8" cy="18" r="2.2" fill="white" />
</svg>
